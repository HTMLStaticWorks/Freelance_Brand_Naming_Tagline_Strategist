<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | Namecraft</title>
  
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
  
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding-top: var(--nav-height);
    }
    
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(8rem, 20vw, 15rem);
      line-height: 1;
      color: var(--accent-color);
      opacity: 0.1;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: -1;
    }
    
    .error-title {
      font-size: clamp(3rem, 6vw, 4rem);
      margin-bottom: var(--space-4);
      position: relative;
    }
    
    .error-desc {
      font-size: 1.2rem;
      max-width: 500px;
      margin-inline: auto;
      margin-bottom: var(--space-8);
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <header class="site-header">
    <div class="container">
      <nav class="navbar">
        <a href="index.html" class="logo">Namecraft</a>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="home2.html">Home 2</a>
          <a href="work.html">Work</a>
          <a href="services.html">Services</a>
          <a href="method.html">Method</a>
          <a href="blog.html">Blog</a>
          <a href="contact.html">Contact</a>
        </div>
        <div class="nav-actions">
          <button id="theme-toggle" class="icon-btn" aria-label="Toggle Dark Mode">
            <i class="ph ph-moon"></i>
          </button>
          <button id="rtl-toggle" class="icon-btn" aria-label="Toggle RTL">
            <i class="ph ph-arrows-left-right"></i>
          </button>
          <button id="mobile-menu-btn" class="icon-btn hamburger" aria-label="Menu">
            <i class="ph ph-list"></i>
          </button>
        </div>
      </nav>
    </div>
  </header>

  <div class="mobile-drawer" id="mobile-drawer">
    <div class="drawer-header">
      <span class="logo">Namecraft</span>
      <button id="close-drawer" class="icon-btn" aria-label="Close Menu">
        <i class="ph ph-x"></i>
      </button>
    </div>
    <div class="drawer-links">
      <a href="index.html">Home</a>
      <a href="home2.html">Home 2</a>
      <a href="work.html">Work</a>
      <a href="services.html">Services</a>
      <a href="method.html">Method</a>
      <a href="blog.html">Blog</a>
      <a href="contact.html">Contact</a>
    </div>
    <div class="drawer-actions">
       <button id="drawer-theme-toggle" class="drawer-btn">
         <i class="ph ph-moon"></i> Theme
       </button>
       <button id="drawer-rtl-toggle" class="drawer-btn">
         <i class="ph ph-arrows-left-right"></i> RTL
       </button>
    </div>
  </div>

  <main>
    <section class="container error-page">
      <div class="error-code">404</div>
      <h1 class="error-title">This Page Doesn't Have a Name Yet.</h1>
      <p class="error-desc">Like an unnamed brand, this URL is currently devoid of meaning. The linguistics you are searching for cannot be found.</p>
      <a href="index.html" class="btn">Return to Syntax</a>
    </section>
  </main>

  <script src="assets/js/main.js"></script>
</body>
</html>
