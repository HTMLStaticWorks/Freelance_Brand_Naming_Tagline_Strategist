<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon | Namecraft</title>
  
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
  
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <style>
    .coming-soon-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    
    .cs-logo {
      font-family: var(--font-display);
      font-size: 2rem;
      margin-bottom: var(--space-12);
    }
    
    .cs-title {
      font-size: clamp(3rem, 8vw, 5rem);
      margin-bottom: var(--space-4);
      line-height: 1.1;
    }
    
    .cs-desc {
      font-size: 1.2rem;
      max-width: 500px;
      margin-inline: auto;
      margin-bottom: var(--space-8);
      opacity: 0.8;
    }
    
    .countdown {
      display: flex;
      gap: var(--space-4);
      justify-content: center;
      margin-bottom: var(--space-8);
    }
    
    .cd-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 80px;
    }
    
    .cd-number {
      font-family: var(--font-display);
      font-size: 3rem;
      color: var(--accent-color);
      line-height: 1;
    }
    
    .cd-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 8px;
    }
    
    .cs-form {
      display: flex;
      max-width: 400px;
      margin-inline: auto;
      width: 100%;
    }
    
    .cs-form input {
      flex-grow: 1;
      border-right: none;
      border-top-right-radius: 0;
      border-bottom-right-radius: 0;
    }
    
    .cs-form button {
      border-top-left-radius: 0;
      border-bottom-left-radius: 0;
      white-space: nowrap;
    }
    
    @media (max-width: 480px) {
      .cs-form {
        flex-direction: column;
      }
      .cs-form input {
        border-right: 1px solid var(--border-color);
        border-radius: var(--radius);
        margin-bottom: var(--space-2);
      }
      .cs-form button {
        border-radius: var(--radius);
      }
    }
  </style>
</head>
<body>

  <!-- Minimal Header for dark/rtl toggle only -->
  <div style="position: absolute; top: var(--space-4); right: var(--space-4); display: flex; gap: var(--space-2);">
    <button id="theme-toggle" class="icon-btn" aria-label="Toggle Dark Mode">
      <i class="ph ph-moon"></i>
    </button>
    <button id="rtl-toggle" class="icon-btn" aria-label="Toggle RTL">
      <i class="ph ph-arrows-left-right"></i>
    </button>
  </div>

  <main>
    <section class="container coming-soon-page">
      <div class="cs-logo">Namecraft</div>
      <h1 class="cs-title">Finding the Right Words.</h1>
      <p class="cs-desc">The nomenclature is currently being synthesized. A new collection of linguistic case studies is launching soon.</p>
      
      <div class="countdown">
        <div class="cd-item">
          <span class="cd-number">14</span>
          <span class="cd-label">Days</span>
        </div>
        <div class="cd-item">
          <span class="cd-number">08</span>
          <span class="cd-label">Hours</span>
        </div>
        <div class="cd-item">
          <span class="cd-number">42</span>
          <span class="cd-label">Mins</span>
        </div>
      </div>
      
      <!-- Mailchimp Embed Placeholder -->
      <form class="cs-form" action="#" onsubmit="event.preventDefault();">
        <input type="email" class="form-control" placeholder="Be first to know when new case studies drop" required>
        <button type="submit" class="btn">Notify Me</button>
      </form>
    </section>
  </main>

  <script src="assets/js/main.js"></script>
</body>
</html>
